<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SKB 마케팅 컨설팅 지원 보드</title>
    <style>
        :root { --skb-red: #E1001A; --bg: #f4f7f6; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        .header { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-left: 10px solid var(--skb-red); margin-bottom: 25px; }
        .search-area { display: flex; gap: 10px; margin-top: 15px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; }
        button { padding: 12px 25px; background: var(--skb-red); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .card h3 { margin-top: 0; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; color: #333; }
        .value { color: var(--skb-red); font-weight: bold; font-size: 20px; }
        .full { grid-column: span 2; background: #fff8f8; border: 1px dashed var(--skb-red); min-height: 100px; padding: 20px; border-radius: 12px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>SKB 마케팅 컨설팅 지원 보드</h1>
        <p>전국 시군구 코드(5자리) 분석 시스템</p>
        <div class="search-area">
            <input type="text" id="areaInput" placeholder="시군구 코드 5자리를 입력하세요 (예: 강남 11680)">
            <button onclick="analyzeArea()">데이터 분석 시작</button>
        </div>
    </div>

    <div class="grid">
        <div class="card">
            <h3>📊 인구/세대 분석</h3>
            <p>지역명: <span id="regionName" class="value">-</span></p>
            <p>총 인구수: <span id="popCount" class="value">-</span> 명</p>
            <p>총 세대수: <span id="houseCount" class="value">-</span> 세대</p>
        </div>

        <div class="card">
            <h3>🏢 주거 환경 분석</h3>
            <div id="aptList" style="font-size: 14px; color: #666;">
                데이터를 불러오면 분석 결과가 표시됩니다.
            </div>
        </div>

        <div class="full">
            <h3>💡 마케팅 전략 제안</h3>
            <div id="strategyText">지역 코드를 입력하고 분석 버튼을 눌러주세요.</div>
        </div>
    </div>
</div>

<script src="config.js"></script>
<script>
    // API_KEY는 config.js(gitignore 처리됨)에서 로드됩니다.

    async function analyzeArea() {
        const sggCd = document.getElementById('areaInput').value.trim();
        if(sggCd.length !== 5) { alert('시군구 코드 5자리를 입력하세요.'); return; }

        document.getElementById('regionName').innerText = "데이터 요청 중...";

        // [중요] 이 주소 형식을 보세요. 가장 원시적이지만 가장 확실합니다.
        const url = "https://apis.data.go.kr/1741000/RegistrationPopulationByRegion/getRegistrationPopulationByRegion?serviceKey=" + API_KEY + "&type=json&pIndex=1&pSize=1&sgg_cd=" + sggCd;
        
        console.log("요청 URL:", url);

        try {
            const response = await fetch(url);
            const text = await response.text(); // JSON 대신 일단 글자로 다 가져옵니다.

            // 만약 서버가 "인증실패"라는 글자를 보냈다면?
            if (text.includes("SERVICE_KEY_IS_NOT_REGISTERED_ERROR")) {
                alert("여전히 '키 등록 대기' 상태입니다. 공공데이터포털 고객센터에 전화 한 통 해보시는 게 빠를 수도 있어요!");
                return;
            }

            const data = JSON.parse(text);
            
            if(data.RegistrationPopulationByRegion) {
                const info = data.RegistrationPopulationByRegion[1].row[0];
                document.getElementById('regionName').innerText = info.adm_nm;
                document.getElementById('popCount').innerText = Number(info.tot_ppltn_cnt).toLocaleString();
                document.getElementById('houseCount').innerText = Number(info.cnt_nm).toLocaleString();
                document.getElementById('strategyText').innerHTML = "<b>[데이터 연결 성공!]</b> 이제 마케팅 분석이 가능합니다.";
            }
        } catch (e) {
            console.error(e);
            alert("서버 연결 실패! 혹시 사내 내부망(보안망)을 쓰고 계신가요? 와이파이를 휴대폰 핫스팟으로 바꿔서 한번만 해보시겠어요?");
        }
    }
</script>

</body>
</html>
